name: linux-cuda

on:
  workflow_dispatch:
    inputs:
      verison:
        description: 'MLX Version'
        required: true
      cuda_archs:
        description: 'MLX_CUDA_ARCHITECTURES (CMake CUDA arch list)'
        required: false
        default: '80-real;90-real;100-real;120-real;80-virtual'
      build_x86_64:
        description: 'Build x86_64'
        required: false
        default: 'true'
        type: choice
        options:
          - true
          - false
      build_aarch64:
        description: 'Build aarch64'
        required: false
        default: 'true'
        type: choice
        options:
          - true
          - false
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  linux-cuda:
    runs-on: ${{ matrix.job.runs-on }}
    container: ${{ matrix.job.container }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.job.target }}-cuda${{ matrix.job.cuda_id }}-${{ inputs.verison }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        job:
          # CUDA 13 has no musl support and MLX needs the GPU compiler + cuDNN,
          # so this is glibc x86_64 only. cuDNN comes from NVIDIA's public
          # redist (no login). aarch64/sbsa can be added the same way.
          - target: "x86_64-linux-gnu"
            arch: "x86_64"
            runs-on: ubuntu-latest
            container: "nvidia/cuda:13.0.1-devel-ubuntu22.04"
            cuda_id: "13"
            cudnn_id: "9"
            cudnn_url: "https://developer.download.nvidia.com/compute/cudnn/redist/cudnn/linux-x86_64/cudnn-linux-x86_64-9.23.0.39_cuda13-archive.tar.xz"
          - target: "aarch64-linux-gnu"
            arch: "aarch64"
            runs-on: ubicloud-standard-8-arm
            container: "nvidia/cuda:13.0.1-devel-ubuntu22.04"
            cuda_id: "13"
            cudnn_id: "9"
            cudnn_url: "https://developer.download.nvidia.com/compute/cudnn/redist/cudnn/linux-sbsa/cudnn-linux-sbsa-9.23.0.39_cuda13-archive.tar.xz"

    name: ${{ matrix.job.target }}-cuda${{ matrix.job.cuda_id }}-cudnn${{ matrix.job.cudnn_id }}

    steps:
      - name: Build Check
        id: build-check
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
            export BUILD_VERSION_V="v${GITHUB_REF##*/v}"
          else
            if [ "${{ matrix.job.arch }}" = "x86_64" ]; then
              echo "build=${{ inputs.build_x86_64 }}" >> $GITHUB_OUTPUT
            fi
            if [ "${{ matrix.job.arch }}" = "aarch64" ]; then
              echo "build=${{ inputs.build_aarch64 }}" >> $GITHUB_OUTPUT
            fi
            export BUILD_VERSION_V="${{ inputs.verison }}"
          fi
          export BUILD_VERSION="${BUILD_VERSION_V#v}"
          echo "version=${BUILD_VERSION}" >> $GITHUB_OUTPUT

      - name: Checkout
        if: steps.build-check.outputs.build == 'true'
        uses: actions/checkout@v4

      - name: Compile
        if: steps.build-check.outputs.build == 'true'
        env:
          # The quantized-matmul CUDA kernels are memory-heavy per nvcc, and
          # each is compiled for every arch — full -j$(nproc) OOM-kills bigger
          # runners. Cap concurrency to keep peak memory in check.
          JOBS: "4"
        run: |
          export ROOTDIR="$(pwd)"
          bash .github/do-build-cuda.sh \
            "${{ steps.build-check.outputs.version }}" "OFF" \
            "${{ matrix.job.arch }}" "${{ matrix.job.cuda_id }}" "${{ matrix.job.cudnn_id }}" \
            "${{ matrix.job.cudnn_url }}" "${ROOTDIR}" \
            "${{ inputs.cuda_archs }}"

      - name: Attest
        if: steps.build-check.outputs.build == 'true'
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            artifact/*.tar.gz
            artifact/*.sha256

      - name: Upload binaries
        if: steps.build-check.outputs.build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.build-check.outputs.version }}
          name: v${{ steps.build-check.outputs.version }}
          files: |
            artifact/*.tar.gz
            artifact/*.sha256
