name: macos

on:
  workflow_dispatch:
    inputs:
      mlx_verison:
        description: 'MLX Version (X.Y.Z)'
        required: true
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  macos:
    runs-on: macos-26
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.mlx_verison }}-${{ matrix.target }}-${{ matrix.deploy }}-${{ matrix.debug }}-${{ matrix.jit }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        # 2 (release/debug) x 2 (jit/no-jit) x 2 (deployment target) = 8.
        # deploy 14.0 -> Metal 3.1, runs on macOS 14+, no ahead-of-time NAX;
        # deploy 26.2 -> Metal 4.0, macOS 26.2+, NAX kernels baked in.
        target: ["arm64-apple-darwin"]
        debug: ["OFF", "ON"]
        jit: ["ON", "OFF"]
        deploy: ["14.0", "26.2"]

    name: ${{ matrix.target }} / ${{ matrix.deploy }} / debug=${{ matrix.debug }} jit=${{ matrix.jit }}

    steps:
      - name: Build Check
        id: build-check
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            export MLX_VERSION_V=${GITHUB_REF##*/v}
          else
            export MLX_VERSION_V=${{ inputs.mlx_verison }}
          fi
          export MLX_VERSION="${MLX_VERSION_V#v}"

          echo "build=true" >> $GITHUB_OUTPUT
          echo "version=${MLX_VERSION}" >> $GITHUB_OUTPUT

      - name: Checkout
        if: steps.build-check.outputs.build == 'true'
        uses: actions/checkout@v4

      - name: Cache MLX Source Code
        if: steps.build-check.outputs.build == 'true'
        id: cache-src
        uses: actions/cache@v4
        with:
          key: mlx-${{ steps.build-check.outputs.version }}
          path: |
            ./mlx-v${{ steps.build-check.outputs.version }}.tar.gz

      - name: Download MLX Source Code
        if: steps.build-check.outputs.build == 'true' && steps.cache-src.outputs.cache-hit != 'true'
        run: |
          export MLX_VERSION=${{ steps.build-check.outputs.version }}
          export MLX_SRC_FILENAME="mlx-v${MLX_VERSION}.tar.gz"
          curl -fSL "https://github.com/ml-explore/mlx/archive/refs/tags/v${MLX_VERSION}.tar.gz" -o "${MLX_SRC_FILENAME}"

      - name: Install Metal toolchain
        if: steps.build-check.outputs.build == 'true'
        run: |
          # Xcode 26 no longer bundles the Metal compiler; it ships as a
          # separately-downloaded component. GitHub pre-installs it for
          # released Xcode 26, so this usually just verifies. Download
          # (with retry for transient catalog fetches) only if missing.
          if ! xcrun -sdk macosx metal --version >/dev/null 2>&1; then
            sudo xcodebuild -runFirstLaunch || true
            for i in 1 2 3; do
              sudo xcodebuild -downloadComponent MetalToolchain && break
              echo "MetalToolchain download failed, retry ${i}..."; sleep 15
            done
          fi
          xcrun -sdk macosx metal --version

      - name: Compile MLX
        if: steps.build-check.outputs.build == 'true'
        id: target
        run: |
          export MLX_VERSION=${{ steps.build-check.outputs.version }}
          export MLX_SRC_FILENAME="mlx-v${MLX_VERSION}.tar.gz"

          export ROOTDIR="$(pwd)"
          export MLX_SRC_DIR="${ROOTDIR}/mlx-${MLX_VERSION}"
          export DESTDIR="${ROOTDIR}/artifact/mlx"

          rm -rf "${MLX_SRC_DIR}"
          mkdir -p "${MLX_SRC_DIR}"
          rm -rf "${DESTDIR}"
          mkdir -p "${DESTDIR}"
          rm -rf "${ROOTDIR}/build"
          mkdir -p "${ROOTDIR}/build"

          tar -xzf "${MLX_SRC_FILENAME}"
          cd "${MLX_SRC_DIR}"

          if [ "${{ matrix.debug }}" = "ON" ]; then
            export CMAKE_BUILD_TYPE=Debug
          else
            export CMAKE_BUILD_TYPE=Release
          fi

          cmake -B build \
            -D CMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE} \
            -D CMAKE_OSX_DEPLOYMENT_TARGET=${{ matrix.deploy }} \
            -D MLX_BUILD_TESTS=OFF \
            -D MLX_BUILD_EXAMPLES=OFF \
            -D MLX_BUILD_BENCHMARKS=OFF \
            -D MLX_BUILD_PYTHON_BINDINGS=OFF \
            -D MLX_METAL_DEBUG=${{ matrix.debug }} \
            -D MLX_METAL_JIT=${{ matrix.jit }} \
            -D BUILD_SHARED_LIBS=ON \
            .

          cmake --build build --config "${CMAKE_BUILD_TYPE}" -j$(sysctl -n hw.ncpu)
          cmake --install build --config "${CMAKE_BUILD_TYPE}"

          # Name keyed by deployment target (the decisive axis):
          # mlx-<target>-<deploy>[-debug][-jit].tar.gz
          VARIANT=""
          if [ "${{ matrix.debug }}" = "ON" ]; then VARIANT="debug"; fi
          if [ "${{ matrix.jit }}" = "ON" ]; then VARIANT="${VARIANT:+${VARIANT}-}jit"; fi
          ARCHIVE_BASENAME="mlx-${{ matrix.target }}-${{ matrix.deploy }}${VARIANT:+-${VARIANT}}"
          ARCHIVE_FILENAME="${ARCHIVE_BASENAME}.tar.gz"
          echo "name=${ARCHIVE_BASENAME}" >> $GITHUB_OUTPUT
          tar -C "${DESTDIR}/usr/local" -czf "${ROOTDIR}/artifact/${ARCHIVE_FILENAME}" .

          cd "${ROOTDIR}/artifact"
          shasum -a 256 "${ARCHIVE_FILENAME}" | tee "${ARCHIVE_FILENAME}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: steps.build-check.outputs.build == 'true'
        with:
          name: ${{ steps.target.outputs.name }}
          path: |
            artifact/*.tar.gz
            artifact/*.sha256
          if-no-files-found: error

      - name: Attest
        uses: actions/attest-build-provenance@v1
        if: steps.build-check.outputs.build == 'true'
        with:
          subject-path: |
            artifact/*.tar.gz
            artifact/*.sha256

      - uses: softprops/action-gh-release@v2
        if: steps.build-check.outputs.build == 'true'
        with:
          tag_name: v${{ steps.build-check.outputs.version }}
          name: v${{ steps.build-check.outputs.version }}
          files: |
            artifact/*.tar.gz
            artifact/*.sha256
